services:
  foodstore-pg-admin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ygolodcom@gmail.com
      PGADMIN_DEFAULT_PASSWORD: 1234
    ports:
      - "5000:80"
    volumes:
      - foodstore-pgadmin-data:/var/lib/pgadmin
    depends_on:
      foodstore-postgres:
        condition: service_healthy
  foodstore-postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${FOODSTORE_USER}
      POSTGRES_PASSWORD: ${FOODSTORE_PASSWORD}
      POSTGRES_DB: ${FOODSTORE_DATABASE}
    volumes:
      - ${PROJECT_ROOT}/out/data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${USER} -d ${DATABASE} -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
  foodstore-backend:
    image: foodstore-backend
    build: .
    expose:
      - "9000"
    env_file:
      - .env

    volumes:
      - ${PROJECT_ROOT}/out/logs:/app/out/logs
      - ./.env:/app/.env
    depends_on:
      foodstore-postgres:
          condition: service_healthy
    environment:
      FOODSTORE_HOST: foodstore-postgres
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - foodstore-backend

  fail2ban:
    image: crazymax/fail2ban:latest
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./nginx/logs:/var/log/nginx:ro
      - ./fail2ban/data:/data
      - ./fail2ban/jail.d:/etc/fail2ban/jail.d
      - ./fail2ban/filter.d:/etc/fail2ban/filter.d
    depends_on:
      - nginx

volumes:
  foodstore-pgadmin-data: