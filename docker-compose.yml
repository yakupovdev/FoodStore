services:
  foodstore-pg-admin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ygolodcom@gmail.com
      PGADMIN_DEFAULT_PASSWORD: 1234
    ports:
      - "80:80"
    volumes:
      - foodstore-pgadmin-data:/var/lib/pgadmin
    depends_on:
      foodstore-postgres:
        condition: service_healthy
  foodstore-postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${FOODSTORE_USER}
      POSTGRES_PASSWORD: ${FOODSTORE_PASSWORD}
      POSTGRES_DB: ${FOODSTORE_DATABASE}
    volumes:
      - ${PROJECT_ROOT}/out/data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${USER} -d ${DATABASE} -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
  foodstore-backend:
    image: foodstore-backend
    build: .
    ports:
      - "9000:9000"
    env_file:
      - .env

    volumes:
      - ${PROJECT_ROOT}/out/logs:/app/out/logs
      - ./.env:/app/.env
    depends_on:
      foodstore-postgres:
          condition: service_healthy
    environment:
      FOODSTORE_HOST: foodstore-postgres

volumes:
  foodstore-pgadmin-data: